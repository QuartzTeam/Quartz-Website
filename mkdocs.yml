site_name: Quartz Docs
site_url: https://quartzz.xyz/docs/
site_description: Documentation for Quartz, an all-in-one mod for A Dance of Fire and Ice.

repo_url: https://github.com/QuartzTeam/Quartz
repo_name: QuartzTeam/Quartz
edit_uri: https://github.com/QuartzTeam/Quartz-Website/edit/main/docs/

theme:
  name: material
  logo: assets/QuartzLogo.png
  favicon: assets/favicon.png
  font:
    text: Manrope
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/quartz.css

extra_javascript:
  - javascripts/header-links.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  homepage: https://quartzz.xyz/

nav:
  - Overview: index.md
  - Getting started:
      - Install: install.md
      - Troubleshooting: troubleshooting.md
  - Features:
      - features/index.md
      - Key Viewer: features/key-viewer.md
